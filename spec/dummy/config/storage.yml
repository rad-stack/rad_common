test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

google:
  service: GCS
  project: <%= RadConfig.gcs_project_id! %>
  credentials:
    type: "service_account"
    project_id: <%= RadConfig.gcs_project_id! %>
    private_key_id: <%= RadConfig.gcs_private_key_id! %>
    private_key: "<%= RadConfig.gcs_private_key! %>"
    client_email: <%= RadConfig.gcs_client_email! %>
    client_id: <%= RadConfig.gcs_client_id! %>
    auth_uri: "https://accounts.google.com/o/oauth2/auth"
    token_uri: "https://oauth2.googleapis.com/token"
    auth_provider_x509_cert_url: "https://www.googleapis.com/oauth2/v1/certs"
    client_x509_cert_url: "https://www.googleapis.com/robot/v1/metadata/x509/<%= RadConfig.gcs_client_email! %>"
    universe_domain: "googleapis.com"
  bucket: <%= RadConfig.gcs_bucket! %>
