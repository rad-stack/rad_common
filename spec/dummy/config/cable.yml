test:
  adapter: test

development:
  adapter: async

staging:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") {} %>
  ssl_params:
    verify_mode: <%= OpenSSL::SSL::VERIFY_NONE %>

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") {} %>
  ssl_params:
    verify_mode: <%= OpenSSL::SSL::VERIFY_NONE %>
